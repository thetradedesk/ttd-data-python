openapi: "3.0.4"
info:
  title: "TTD Data API"
  version: "v0.1"
  description: |
    Python SDK for The Trade Desk Data API. Provides operations for ingesting advertiser data,
    third-party data, and offline conversions, as well as handling data subject deletion and opt-out requests.

    For more information, see the official API documentation:
    - [Advertiser targeting data (1PD)](https://open.thetradedesk.com/advertiser/docsApp/GuidesAdvertiser/data/doc/post-data-advertiser-firstparty)
    - [Third-party targeting data (3PD)](https://open.thetradedesk.com/provider/docsApp/GuidesProvider/audience/doc/post-data-thirdparty)
    - [Offline conversions (CAPI)](https://open.thetradedesk.com/advertiser/docsApp/GuidesAdvertiser/data/doc/post-providerapi-offlineconversion)

    Deletions and opt-outs:
    - [Advertiser](https://open.thetradedesk.com/advertiser/docsApp/GuidesAdvertiser/data/doc/post-data-deletion-optout-advertiser)
    - [Third party](https://open.thetradedesk.com/provider/docsApp/GuidesProvider/audience/doc/post-data-deletion-optout-thirdparty)
    - [Merchant](https://open.thetradedesk.com/provider/docsApp/GuidesProvider/retail/doc/post-data-deletion-optout-merchant)
paths:
  /data/advertiser:
    post:
      tags:
        - "Advertiser"
      summary: "Upload first-party data for the specified ID for use in audience targeting."
      operationId: "IngestAdvertiserData"
      parameters:
        - name: "TTD-Auth"
          in: "header"
          description: "Data API token for authentication."
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvertiserDataRequest"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertiserDataServerResponse"
        "400":
          description: "Bad Request - Invalid JSON, missing items, advertiser not configured, or policy restrictions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertiserDataServerResponse"
        "403":
          description: "Forbidden - Cannot create new targeting data for this advertiser"
          content:
            application/json:
              schema:
                type: "string"
        "413":
          description: "Request Entity Too Large - Request size exceeds the allowed limit"
          content:
            application/json:
              schema:
                type: "string"
        "429":
          description: "Too Many Requests - Rate limit exceeded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertiserDataServerResponse"
        "500":
          description: "Internal Server Error - Unexpected server error"
        "503":
          description: "Service Unavailable - Handler disabled or request dropped"
      servers:
        - url: "https://usw-data.adsrvr.org"
  /data/thirdparty:
    post:
      tags:
        - "ThirdParty"
      summary: "Upload third-party data for the specified data provider for use in audience targeting."
      operationId: "IngestThirdPartyData"
      parameters:
        - name: "TTD-Auth"
          in: "header"
          description: "Data API token for authentication."
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThirdPartyDataRequest"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThirdPartyDataServerResponse"
        "400":
          description: "Bad Request - Invalid JSON, missing items, data provider not configured, or policy restrictions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThirdPartyDataServerResponse"
        "403":
          description: "Forbidden - Cannot create new targeting data for this data provider"
          content:
            application/json:
              schema:
                type: "string"
        "413":
          description: "Request Entity Too Large - Request size exceeds the allowed limit"
          content:
            application/json:
              schema:
                type: "string"
        "429":
          description: "Too Many Requests - Rate limit exceeded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThirdPartyDataServerResponse"
        "500":
          description: "Internal Server Error - Unexpected server error"
        "503":
          description: "Service Unavailable - Handler disabled or request dropped"
      servers:
        - url: "https://bulk-data.adsrvr.org"
  /providerapi/offlineconversion:
    post:
      tags:
        - "OfflineConversion"
      summary: "Upload offline conversion data for the specified data provider."
      operationId: "IngestOfflineConversionData"
      parameters:
        - name: "TTD-Auth"
          in: "header"
          description: "Data API token for authentication."
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfflineConversionDataRequest"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineConversionDataServerResponse"
        "400":
          description: "Bad Request - Invalid JSON, missing items, data provider not configured, or policy restrictions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineConversionDataServerResponse"
        "403":
          description: "Forbidden - Cannot create offline conversion data for this data provider"
          content:
            application/json:
              schema:
                type: "string"
        "413":
          description: "Request Entity Too Large - Request size exceeds the allowed limit"
          content:
            application/json:
              schema:
                type: "string"
        "429":
          description: "Too Many Requests - Rate limit exceeded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfflineConversionDataServerResponse"
        "500":
          description: "Internal Server Error - Unexpected server error"
        "503":
          description: "Service Unavailable - Handler disabled or request dropped"
      servers:
        - url: "https://offlineattrib.adsrvr.org"
  /data/deletion-optout/advertiser:
    post:
      tags:
        - "DeletionOptOut"
      summary: "Delete IDs shared with The Trade Desk for the specified advertiser ID."
      operationId: "DataSubjectRequestAdvertiserData"
      parameters:
        - name: "TTD-Auth"
          in: "header"
          description: "Data API token for authentication."
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdvertiserDsrRequest"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertiserDsrResponse"
        "400":
          description: "Bad Request - Invalid JSON, missing items, advertiser not configured, or policy restrictions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertiserDsrResponse"
        "403":
          description: "Forbidden - Cannot process data subject request for this advertiser"
          content:
            application/json:
              schema:
                type: "string"
        "413":
          description: "Request Entity Too Large - Request size exceeds the allowed limit"
          content:
            application/json:
              schema:
                type: "string"
        "429":
          description: "Too Many Requests - Rate limit exceeded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvertiserDsrResponse"
        "500":
          description: "Internal Server Error - Unexpected server error"
        "503":
          description: "Service Unavailable - Handler disabled or request dropped"
      servers:
        - url: "https://usw-data.adsrvr.org"
  /data/deletion-optout/merchant:
    post:
      tags:
        - "DeletionOptOut"
      summary: "Delete IDs shared with The Trade Desk via a product catalog for the specified merchant ID."
      operationId: "DataSubjectRequestMerchantData"
      parameters:
        - name: "TTD-Auth"
          in: "header"
          description: "Data API token for authentication."
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantDsrRequest"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantDsrResponse"
        "400":
          description: "Bad Request - Invalid JSON, missing items, merchant not configured, or policy restrictions"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantDsrResponse"
        "403":
          description: "Forbidden - Cannot process data subject request for this merchant"
          content:
            application/json:
              schema:
                type: "string"
        "413":
          description: "Request Entity Too Large - Request size exceeds the allowed limit"
          content:
            application/json:
              schema:
                type: "string"
        "429":
          description: "Too Many Requests - Rate limit exceeded"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantDsrResponse"
        "500":
          description: "Internal Server Error - Unexpected server error"
        "503":
          description: "Service Unavailable - Handler disabled or request dropped"
      servers:
        - url: "https://usw-data.adsrvr.org"
  /data/deletion-optout/thirdparty:
    post:
      tags:
        - "DeletionOptOut"
      summary: "Delete IDs shared with The Trade Desk for the specified data provider ID."
      operationId: "DataSubjectRequestThirdPartyData"
      parameters:
        - name: "TTD-Auth"
          in: "header"
          description: "Data API token for authentication."
          required: true
          schema:
            type: "string"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThirdPartyDsrRequest"
        required: true
      responses:
        "200":
          description: "Success"
          content:
            application/json:
              schema:
