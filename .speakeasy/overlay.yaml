overlay: 1.0.0
info:
  title: Add DataOrigins field
  version: 1.0.0
actions:
  - target: "$.components.schemas"
    update:
      DataOriginType:
        type: string
        enum:
          - "Advertiser"
          - "DataProvider"
          - "Integration"
          - "Onboarder"
      DataOrigin:
        required:
          - "Id"
          - "Type"
        type: object
        properties:
          Id:
            type: string
          Type:
            $ref: "#/components/schemas/DataOriginType"
        additionalProperties: false

  - target: "$.components.schemas.AdvertiserDataRequest.properties"
    update:
      DataOrigins:
        type: array
        items:
          $ref: "#/components/schemas/DataOrigin"
        nullable: true

  - target: "$.components.schemas.ThirdPartyDataRequest.properties"
    update:
      DataOrigins:
        type: array
        items:
          $ref: "#/components/schemas/DataOrigin"
        nullable: true

  - target: "$.components.schemas.OfflineConversionDataRequest.properties"
    update:
      DataOrigins:
        type: array
        items:
          $ref: "#/components/schemas/DataOrigin"
        nullable: true