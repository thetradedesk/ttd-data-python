configVersion: 2.0.0
generation:
  devContainers:
    enabled: true
    schemaPath: .speakeasy/out.openapi.yaml
  sdkClassName: BaseDataClient
  maintainOpenAPIOrder: true
  usageSnippets:
    optionalPropertyRendering: withExample
    sdkInitStyle: constructor
  useClassNamesForArrayFields: true
  fixes:
    nameResolutionDec2023: true
    nameResolutionFeb2025: true
    parameterOrderingFeb2024: true
    requestResponseComponentNamesFeb2024: true
    securityFeb2025: true
    sharedErrorComponentsApr2025: true
    sharedNestedComponentsJan2026: true
    nameOverrideFeb2026: true
  auth:
    oAuth2ClientCredentialsEnabled: true
    oAuth2PasswordEnabled: true
    hoistGlobalSecurity: true
  inferSSEOverload: true
  sdkHooksConfigAccess: true
  schemas:
    allOfMergeStrategy: shallowMerge
  requestBodyFieldName: body
  versioningStrategy: automatic
  persistentEdits:
    enabled: "true"
  tests:
    generateTests: true
    generateNewTests: false
    skipResponseBodyAssertions: false
python:
  version: 0.2.7
  additionalDependencies:
    dev: {}
    main:
      uid2-client: '>=2.9.0,<3.0.0'
  allowedRedefinedBuiltins:
    - id
    - object
    - input
  asyncMode: both
  authors:
    - Speakeasy
  baseErrorName: DataError
  bodyVariantOverloads: false
  clientServerStatusCodesAsErrors: true
  constFieldCasing: normal
  defaultErrorName: APIError
  description: Python Client SDK for TTD Data API.
  durationFormat: false
  enableCustomCodeRegions: false
  enumFormat: enum
  envVarPrefix: TTD_DATA
  errorSchemaValidation: true
  eventStreamClassNames:
    async: EventStreamAsync
    sync: EventStream
  fixFlags:
    asyncPaginationSep2025: true
    conflictResistantModelImportsFeb2026: false
    responseRequiredSep2024: true
  flattenGlobalSecurity: true
  flattenRequests: true
  flatteningOrder: parameters-first
  forwardCompatibleEnumsByDefault: false
  forwardCompatibleUnionsByDefault: "false"
  imports:
    option: openapi
    paths:
      callbacks: ""
      errors: errors
      operations: ""
      shared: ""
      webhooks: ""
  inferUnionDiscriminators: true
  inputModelSuffix: input
  inputTypedDictSuffix: TypedDict
  license:
    name: Apache License 2.0
    shortName: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  maxMethodParams: 999
  methodArguments: infer-optional-args
  methodTimeoutArgument: timeout-ms
  methodTimeoutUnits: milliseconds
  moduleName: ""
  multipartArrayFormat: standard
  optionalDependencies: {}
  outputModelSuffix: output
  packageManager: uv
  packageName: ttd-data
  preApplyUnionDiscriminators: true
  pytestFilterWarnings: []
  pytestTimeout: 0
  rawResponseHelpers: false
  responseFormat: envelope-http
  responseSchemaValidation: true
  sseFlatResponse: false
  templateVersion: v2
  useAsyncHooks: false
  uuidFormat: false
